<!DOCTYPE html>
<html>
    <!-- スペースの数はそちらに合わせます。 -->
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column; 
    }

    #base {
        position: relative;
        aspect-ratio: 9 / 16;
        width: min(100lvw, calc(100vh * 9 / 16));
        height: auto;
        background-color: lightgray;
        margin: 0 auto;
        z-index: 1;
    }

    #backtextbox {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 30%;
        background-color: gray;
        z-index: 5;
    }

    </style> <!-- 画面比は9:16固定で、幅の狭い方に合わせる感じで -->
        <title>utktanteiroku_sample</title>
    </head>
    <body>
        <div id="base">
            <div id="background"></div>

            <div id="backtextbox" class="maintext"><!--テキストの後ろに配置されるゲーム上のテキストの見かけの枠-->
                <div id="textbox" class="maintext">
                    <p>ここにテキストが入ります。</p>
                </div><!--実際にテキストを表示させるdiv-->
            </div>
        </div>
        
    </body>
</html>
