<!DOCTYPE html>
<html>
    <!-- スペースの数はそちらに合わせます。 -->
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/style.css">
        <title>utktanteiroku_sample_title</title>
    </head>
    <body>
        <div id="base">
            <div id="background"></div> 
            <div id="mainlogotype"> <!-- タイトル画面のタイトルロゴを配置するためのdiv。背景と同様に、画像を使用する予定です。 -->
            </div>              
            <div id="buttonblock"><!-- ボタンの整列用-->
                <button id="storybutton" class="titlebutton">
                    ストーリーを始める
                </button>
                <button id="solvingbutton" class="titlebutton">
                    謎解き専用モードを始める
                </button>
                <button id="camerabutton" class="titlebutton">
                    カメラを起動する
                </button>
                <button id="codebutton" class="titlebutton">
                    コードを入力する
                </button>
            </div>
        </div>
        
    </body>
</html>
